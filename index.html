<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>X-GRID</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h1>X-GRID</h1>
    <p>fyi: don't try to guess "X", any wrong answers will result in a 10-minute cool down being activated:(</p>
</header>

<div class="main-layout">

    <!-- GRID -->

    <div class="grid-container">
        <div class="grid" id="grid"></div>
    </div>

    <!-- SIDE PANEL -->

    <div class="panel">

        <!-- CODE INPUT -->

        <h2>Enter Hint Code</h2>

        <div class="input-group">

            <input
                type="text"
                id="codeInput"
                placeholder="Enter code..."
                maxlength="4"
            >

            <button id="submitBtn">
                Apply
            </button>

        </div>

        <div class="status" id="status"></div>

        <!-- USED CODES -->

        <h2>Used Codes</h2>

        <div class="used-codes" id="usedCodes"></div>

        <!-- X GUESSING -->

        <div class="guess-section">

            <h2>What's X?</h2>

            <div class="input-group">

                <input
                    type="number"
                    id="guessInput"
                    placeholder="Enter guess..."
                >

                <button id="guessBtn">
                    Enter
                </button>

            </div>

            <div class="guess-status" id="guessStatus"></div>

            <div class="cooldown-timer" id="cooldownTimer"></div>

        </div>

    </div>

</div>

<footer>
    Placeholder
</footer>

<script src="script.js"></script>

</body>
</html>
